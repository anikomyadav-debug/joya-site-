<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYA Mark XXXIX — Interactive Study Notes</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Premium handwriting and display fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@400;700&family=Playpen+Sans:wght@300;500;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      padding-bottom: 60px;
    }

    .notes-container {
      width: min(90%, 800px);
      margin-top: 20px;
      z-index: 10;
    }

    /* Style Switcher */
    .style-switcher {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 24px;
      border-radius: 16px;
      backdrop-filter: blur(20px);
    }

    .style-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .btn-toggle {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.15, 1, 0.3, 1);
    }

    .btn-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Lined Paper / Legal Pad Style */
    .paper-sheet {
      background: #18191f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 50px 60px;
      min-height: 600px;
      box-shadow: var(--shadow-lg), 0 0 50px rgba(110, 106, 255, 0.03);
      position: relative;
      transition: all 0.5s cubic-bezier(0.15, 1, 0.3, 1);
    }

    /* Lined/Notebook lines for Handwritten style */
    .paper-sheet.handwritten {
      background: #fbf0d9;
      color: #1a237e; /* Royal blue ink */
      border: 1px solid #e0d0b0;
      box-shadow: var(--shadow-lg), 0 10px 30px rgba(0,0,0,0.15);
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0) 0%, rgba(26, 35, 126, 0.08) 96%, rgba(26, 35, 126, 0.08) 100%),
        linear-gradient(90deg, transparent 79px, #ff8a80 79px, #ff8a80 81px, transparent 81px);
      background-size: 100% 32px, 100% 100%;
      line-height: 32px !important;
      padding: 48px 50px 48px 100px; /* Leave space for red vertical line */
      border-radius: 6px;
    }

    /* Red ring binders */
    .paper-sheet.handwritten::before {
      content: '';
      position: absolute;
      left: 24px;
      top: 0;
      bottom: 0;
      width: 14px;
      background-image: radial-gradient(circle, #3e2723 6px, transparent 7px);
      background-size: 100% 80px;
      opacity: 0.15;
    }

    .notes-header {
      margin-bottom: 30px;
      position: relative;
    }

    .notes-header h2 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .handwritten .notes-header h2 {
      font-family: 'Kalam', cursive;
      color: #1a237e;
      border-bottom: 2px double rgba(26, 35, 126, 0.2);
      padding-bottom: 8px;
    }

    .notes-meta {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .handwritten .notes-meta {
      font-family: 'Architects Daughter', cursive;
      color: #5c6bc0;
    }

    .notes-content {
      font-size: 1.05rem;
      white-space: pre-wrap;
    }

    .handwritten .notes-content {
      font-family: 'Caveat', cursive;
      font-size: 1.6rem;
      font-weight: 600;
      color: #0c1c8c;
      line-height: 32px;
      transform: rotate(-0.3deg);
      transform-origin: left top;
    }

    .handwritten h3, .handwritten h4 {
      font-family: 'Kalam', cursive;
      color: #1b5e20;
      margin-top: 24px;
      margin-bottom: 12px;
      text-decoration: underline wavy rgba(27, 94, 32, 0.4);
    }

    .handwritten ul, .handwritten ol {
      padding-left: 20px;
    }
    
    .handwritten strong {
      color: #b71c1c;
      font-family: 'Playpen Sans', cursive;
      font-size: 1.1rem;
      background: rgba(255, 235, 59, 0.45);
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap notes-container animate-fade-up">
    
    <div class="style-switcher">
      <div class="style-title">Study Companion Notes</div>
      <button class="btn-toggle" id="styleToggle" onclick="toggleStyle()">✍️ Switch to Handwritten</button>
    </div>

    <div class="paper-sheet" id="paperSheet">
      <div class="notes-header">
        <h2 id="noteTitle">Study Notes</h2>
        <div class="notes-meta" id="noteMeta">Last synchronized: Just now</div>
      </div>
      <div class="notes-content" id="noteContent">
        Loading your premium notes...
      </div>
    </div>
  </div>

  <script>
    let currentStyle = 'digital'; // digital or handwritten
    let notesData = null;

    async function loadNotes() {
      try {
        const res = await fetch('/api/notes');
        if (res.ok) {
          const data = await res.json();
          if (data.notes && data.notes.content) {
            notesData = data.notes;
            renderNotes();
            return;
          }
        }
      } catch (e) {
        console.error("Notes fetch error:", e);
      }
      
      // Fallback
      notesData = {
        topic: "Machine Learning Basics",
        content: "### Introduction\nMachine learning is a method of data analysis that automates analytical model building.\n\n### Key Concepts\n- **Supervised Learning**: Model learns from labeled data.\n- **Unsupervised Learning**: Model finds patterns in unlabeled data.",
        created: new Date().toISOString()
      };
      renderNotes();
    }

    function renderNotes() {
      if (!notesData) return;
      document.getElementById('noteTitle').textContent = notesData.topic || 'AI Study Notes';
      
      let rawContent = notesData.content;
      
      // Convert markdown headers/bullets into plain HTML tags if in handwritten mode to style headings green
      if (currentStyle === 'handwritten') {
        rawContent = rawContent
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/^\- (.*$)/gim, '• $1');
      }

      document.getElementById('noteContent').innerHTML = rawContent;
      
      const date = notesData.created ? new Date(notesData.created).toLocaleString() : 'Just now';
      document.getElementById('noteMeta').textContent = `📅 Saved: ${date} · AI Generated`;
    }

    function toggleStyle() {
      const sheet = document.getElementById('paperSheet');
      const btn = document.getElementById('styleToggle');
      
      if (currentStyle === 'digital') {
        currentStyle = 'handwritten';
        sheet.classList.add('handwritten');
        btn.textContent = '💻 Switch to Digital';
      } else {
        currentStyle = 'digital';
        sheet.classList.remove('handwritten');
        btn.textContent = '✍️ Switch to Handwritten';
      }
      renderNotes();
    }

    window.onload = loadNotes;
  </script>
</body>
</html>
