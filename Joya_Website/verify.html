<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JOYA — Verify Your Email</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
  <style>
    .verify-box {
      text-align: center;
    }
    
    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 24px 0;
    }
    
    .otp-digit {
      width: 50px;
      height: 60px;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .otp-digit:focus {
      border-color: rgba(41, 151, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(41, 151, 255, 0.08);
    }

    .dev-hint {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      margin-top: 24px;
      font-size: 0.825rem;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card verify-box animate-fade-up">
      <div class="login-logo">
        <h1>Verify Your Gmail</h1>
        <p id="emailSubtitle">We sent a 6-digit OTP code to your address.</p>
      </div>

      <div class="login-error" id="errorBox"></div>

      <form id="verifyForm">
        <div class="field" style="margin-bottom: 24px;">
          <input type="text" id="otpCode" placeholder="Enter 6-digit OTP code" maxlength="6" pattern="[0-9]{6}" required style="width: 100%; padding: 14px; font-size: 1.45rem; font-weight: 700; text-align: center; letter-spacing: 0.25em; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; outline: none; transition: all 0.3s;" onfocus="this.style.borderColor='rgba(41, 151, 255, 0.4)';" onblur="this.style.borderColor='rgba(255,255,255,0.08)';">
        </div>

        <button type="submit" class="login-btn">Verify Account</button>
      </form>
      <div style="margin-top: 20px; font-size: 0.85rem; color: var(--soft);">
        Didn't receive the OTP? <span id="resendBtn" style="color: #2997ff; cursor: pointer; text-decoration: underline;" onclick="resendOTP()">Resend Code</span>
      </div>

      <!-- Developer Hint Box (Shows OTP locally if SMTP isn't configured) -->
      <div class="dev-hint" id="devHint" style="display:none; margin-top:20px; background:rgba(41,151,255,0.06); border:1px solid rgba(41,151,255,0.15); border-radius:12px; padding:12px; font-size:0.85rem;">
        <span>🛠️ <b>Local Test Mode:</b> Real email was not sent. Use code: <strong id="devHintOtp" style="color:#fff; font-size:1.15rem; letter-spacing:1px; font-family:monospace; margin-left:4px;">------</strong> to verify.</span>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || '';
    if (email) {
      document.getElementById('emailSubtitle').textContent = `We sent a 6-digit OTP code to ${email}`;
    }

    const otpInput = document.getElementById('otpCode');
    if (otpInput) otpInput.focus();

    // Fetch and display OTP locally so developer is never blocked if SMTP fails
    (async function fetchLocalOtp() {
      try {
        const res = await fetch(`/api/get-otp?email=${encodeURIComponent(email)}`);
        if (res.ok) {
          const data = await res.json();
          if (data.otp) {
            const hint = document.getElementById("devHint");
            const hintOtp = document.getElementById("devHintOtp");
            if (hint && hintOtp) {
              hintOtp.textContent = data.otp;
              hint.style.display = "block";
            }
          }
        }
      } catch (e) {
        console.log("No local OTP found");
      }
    })();

    if (urlParams.get("test") === "1") {
      setTimeout(async () => {
        try {
          const res = await fetch(`/api/get-otp?email=${encodeURIComponent(email)}`);
          const data = await res.json();
          if (data.otp && otpInput) {
            for (let i = 1; i <= data.otp.length; i++) {
              await new Promise(r => setTimeout(r, 150));
              otpInput.value = data.otp.substring(0, i);
            }
            setTimeout(() => {
              document.getElementById("verifyForm").dispatchEvent(new Event("submit"));
            }, 1000);
          }
        } catch (e) {
          console.error("Auto test verify failed:", e);
        }
      }, 1500);
    }

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = otpInput.value.trim();
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';

      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        
        const result = await res.json();
        
        if (res.ok && result.ok) {
          window.location.href = result.redirect || '/';
        } else {
          errorBox.textContent = result.error || 'Verification failed. Please try again.';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'Server connection error.';
        errorBox.style.display = 'block';
      }
    });

    async function resendOTP() {
      const resendBtn = document.getElementById("resendBtn");
      if (resendBtn.style.pointerEvents === "none") return;
      
      resendBtn.style.pointerEvents = "none";
      resendBtn.style.color = "var(--muted)";
      resendBtn.textContent = "Sending...";
      
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "none";
      errorBox.style.color = ""; // reset color
      
      try {
        const res = await fetch("/api/resend-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        
        if (res.ok && data.ok) {
          errorBox.textContent = data.message || "New OTP sent!";
          errorBox.style.color = "#4ade80"; // green text
          errorBox.style.display = "block";
          
          let countdown = 30;
          const interval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
              clearInterval(interval);
              resendBtn.style.pointerEvents = "auto";
              resendBtn.style.color = "#2997ff";
              resendBtn.textContent = "Resend Code";
              errorBox.style.color = "";
              errorBox.style.display = "none";
            } else {
              resendBtn.textContent = `Resend in ${countdown}s`;
            }
          }, 1000);
        } else {
          errorBox.textContent = data.error || "Failed to resend code.";
          errorBox.style.display = "block";
          resendBtn.style.pointerEvents = "auto";
          resendBtn.style.color = "#2997ff";
          resendBtn.textContent = "Resend Code";
        }
      } catch(e) {
        errorBox.textContent = "Server connection error.";
        errorBox.style.display = "block";
        resendBtn.style.pointerEvents = "auto";
        resendBtn.style.color = "#2997ff";
        resendBtn.textContent = "Resend Code";
      }
    }
  </script>
</body>
</html>
